[remote_assets]
url = "https://images.unsplash.com/photo-1578234467412-b0bbdb4c2283"
local_name = "dallas_skyline_4k.jpg"
hash_verify = "SHA256_SUM_HERE" # Security first for Pentoo

[vfx_mapping]
# Target the "Green Building" for the initial crack
impact_x = 0.22         
impact_y = 0.45
# Target the Reunion Tower (the Ball) for a secondary "EMP" pulse
pulse_center = [0.85, 0.55]

[source]
background = "dallas_unsplash_4k.jpg"
mascot = "ronin_tux_hog.png" # Rendered from your POV-Ray script

[shatter]
# Impact on the tall building (Left-Center)
impact_x = 0.22         
impact_y = 0.40         
shard_count = 180       # High detail for 4K
gravity = 15            # How fast shards fall
zoom_speed = 1.05       # 5% growth per frame for the 'Push'

[vfx]
sakura_drift = false    # Add the 🌸 petals behind the glass
green_pulse = true      # Flash the building green on impact
[shatter_variety]
mode = "voronoi_needle"      # Options: needle, chunk, spiderweb
chaos_factor = 0.4           # 0.0 to 1.0 (Higher = more irregular shards)
impact_jitter = 50           # Randomly shifts the hit point by 50px
force_variation = 1.2        # Randomizes shard velocity per boot

[tux_push]
lean_angle = "random"        # Tux can lean left/right on the Hog
motion_blur_intensity = 0.8  # Adds 'Speed' to the jump

[theme_override]
name = "Dallas-Breach-Ronin"
enable_sakura = false        # Clean, dark Dallas vibe
enable_motion_blur = true    # High-octane 'Push' effect

[shatter_physics]
# Since no petals, we increase shard count for 'Pulverized' glass
shard_count = 250            
shard_glow = "#00FF00"       # Pentoo Green light in the cracks

